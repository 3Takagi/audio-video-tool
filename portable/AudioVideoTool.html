<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>音视频工具入口</title>
  <style>
    :root {
      color-scheme: light;
      --accent: #4f7cff;
      --accent-2: #ff5d9d;
      --accent-3: #2fd3c5;
      --text: #17202a;
      --muted: #647184;
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 8% 12%, rgba(47, 211, 197, .34), transparent 24%),
        radial-gradient(circle at 92% 12%, rgba(255, 93, 157, .28), transparent 28%),
        linear-gradient(135deg, #eaf6ff, #fff2f7 46%, #eff8f0);
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.28) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.24) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.72), transparent 78%);
    }

    main {
      position: relative;
      width: min(820px, 100%);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.72);
      border-radius: 30px;
      padding: 28px;
      background: rgba(255,255,255,.68);
      box-shadow: 0 22px 70px rgba(42, 55, 89, .18);
      backdrop-filter: blur(22px) saturate(1.35);
      -webkit-backdrop-filter: blur(22px) saturate(1.35);
    }

    main::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: 42px;
      bottom: -48px;
      border: 1px solid rgba(255,255,255,.72);
      border-radius: 42px;
      transform: rotate(18deg);
      background: linear-gradient(135deg, rgba(255,255,255,.24), rgba(255,255,255,.04));
      pointer-events: none;
    }

    .brand {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .logo {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      box-shadow: 0 14px 28px rgba(79,124,255,.28);
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.12;
    }

    p {
      position: relative;
      z-index: 1;
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      font-weight: 650;
      line-height: 1.75;
    }

    .status {
      position: relative;
      z-index: 1;
      margin: 22px 0;
      padding: 16px 18px;
      border: 1px solid rgba(255,255,255,.78);
      border-radius: 20px;
      background: rgba(255,255,255,.56);
      color: #623449;
      font-weight: 900;
    }

    .actions {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    a,
    button {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 16px;
      padding: 0 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font: inherit;
      font-weight: 950;
      text-decoration: none;
      box-shadow: 0 14px 26px rgba(79,124,255,.24);
      cursor: pointer;
    }

    .secondary {
      background: rgba(255,255,255,.66);
      color: var(--accent);
      box-shadow: none;
    }

    code {
      padding: 2px 7px;
      border-radius: 8px;
      background: rgba(255,255,255,.68);
      color: #334155;
      font-weight: 800;
    }

    @media (max-width: 640px) {
      main {
        padding: 22px;
        border-radius: 24px;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <img class="logo" src="app/static/logo.svg" alt="">
      <div>
        <p class="eyebrow">LOCAL MEDIA WORKBENCH</p>
        <h1>音视频工具入口</h1>
      </div>
    </div>

    <p>
      这个 HTML 只能连接已经运行中的本地网页，不能直接启动 Python 后端。
      如果没有自动打开，请先双击同文件夹里的 <code>start.bat</code>。
    </p>

    <div id="status" class="status">正在检查 7860-7870 端口...</div>

    <div class="actions">
      <button id="scan" type="button">重新查找正在运行的服务</button>
      <a class="secondary" href="http://127.0.0.1:7860/">手动打开 7860</a>
    </div>
  </main>

  <script>
    const statusBox = document.getElementById("status");
    const scanButton = document.getElementById("scan");

    async function probe(port) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 550);
      try {
        await fetch(`http://127.0.0.1:${port}/`, {
          mode: "no-cors",
          cache: "no-store",
          signal: controller.signal
        });
        clearTimeout(timer);
        return true;
      } catch {
        clearTimeout(timer);
        return false;
      }
    }

    async function scanPorts() {
      scanButton.disabled = true;
      statusBox.textContent = "正在检查 7860-7870 端口...";
      for (let port = 7860; port <= 7870; port += 1) {
        statusBox.textContent = `正在检查 http://127.0.0.1:${port}/`;
        if (await probe(port)) {
          const url = `http://127.0.0.1:${port}/`;
          statusBox.textContent = `已找到服务：${url}`;
          window.location.href = url;
          scanButton.disabled = false;
          return;
        }
      }
      statusBox.textContent = "没有找到正在运行的服务。请先双击 start.bat，再回到这里重新查找。";
      scanButton.disabled = false;
    }

    scanButton.addEventListener("click", scanPorts);
    scanPorts();
  </script>
</body>
</html>
