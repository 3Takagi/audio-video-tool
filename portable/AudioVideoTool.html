<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>音视频工具入口</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #fff7fb;
      color: #17121f;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
    }
    main {
      width: min(760px, calc(100vw - 44px));
      border: 3px solid #17121f;
      border-radius: 22px;
      box-shadow: 12px 12px 0 #17121f;
      background: rgba(255,255,255,.9);
      padding: 34px;
    }
    .eyebrow {
      color: #ff3366;
      font-weight: 900;
      letter-spacing: .06em;
    }
    h1 { margin: 12px 0 14px; font-size: 42px; }
    p { line-height: 1.8; color: #4d4656; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 24px; }
    a, button {
      border: 2px solid #17121f;
      border-radius: 999px;
      padding: 11px 18px;
      background: #ffdf4d;
      color: #17121f;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
    }
    .secondary { background: #fff; }
    code { background: #f3edf5; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">AUDIO VIDEO TOOL</div>
    <h1>音视频工具入口</h1>
    <p>
      这个 HTML 只能打开已经运行中的本地网页，浏览器不能直接启动 Python 后端。
      如果打不开，请先运行同文件夹里的 <code>start.bat</code>，或安装桌面 App。
    </p>
    <div class="actions">
      <a href="http://127.0.0.1:7860/">打开 7860</a>
      <a href="http://127.0.0.1:7861/" class="secondary">打开 7861</a>
      <a href="http://127.0.0.1:7862/" class="secondary">打开 7862</a>
      <button id="scan">自动尝试常用端口</button>
    </div>
  </main>
  <script>
    document.getElementById("scan").addEventListener("click", () => {
      for (let port = 7860; port <= 7870; port += 1) {
        window.open(`http://127.0.0.1:${port}/`, "_blank");
      }
    });
  </script>
</body>
</html>
